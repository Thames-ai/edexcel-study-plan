<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edexcel A-Level 每日学习计划</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap');
:root{--bg:#080c14;--bg2:#0f1520;--card:#141c2b;--surface:#111827;--text:#e2e8f0;--text2:#94a3b8;--muted:#64748b;--border:#1e293b;--border2:#334155;--accent:#3b82f6;--green:#10b981;--red:#ef4444;--yellow:#eab308;--orange:#f97316;--purple:#8b5cf6;--cyan:#06b6d4}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);line-height:1.6}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(800px 600px at 15% 5%,rgba(59,130,246,0.05),transparent),radial-gradient(600px 400px at 85% 90%,rgba(139,92,246,0.04),transparent);pointer-events:none;z-index:0}

.topnav{position:sticky;top:0;z-index:100;background:rgba(8,12,20,0.88);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:14px;padding:10px 20px;overflow-x:auto}
.nav-logo{font-weight:800;font-size:15px;color:var(--accent);white-space:nowrap;letter-spacing:-0.5px}
.nav-links{display:flex;gap:4px}
.nav-links button{background:none;border:1px solid transparent;border-radius:8px;color:var(--text2);font-size:13px;font-weight:500;padding:6px 14px;cursor:pointer;white-space:nowrap;transition:all .2s;font-family:inherit}
.nav-links button:hover{color:var(--text);background:var(--surface)}
.nav-links button.active{color:var(--accent);background:rgba(59,130,246,0.1);border-color:rgba(59,130,246,0.2)}
.nav-badge{font-family:'JetBrains Mono',monospace;font-size:11px;background:var(--red);color:#fff;border-radius:100px;padding:1px 7px;margin-left:4px;font-weight:600}

.section{display:none}.section.active{display:block}
.container{max-width:920px;margin:0 auto;padding:28px 20px 60px;position:relative;z-index:1}

.hdr{text-align:center;margin-bottom:32px}
.hdr-badge{display:inline-block;font-size:12px;font-weight:600;color:var(--accent);background:rgba(59,130,246,0.1);border:1px solid rgba(59,130,246,0.2);padding:4px 14px;border-radius:100px;letter-spacing:1px;text-transform:uppercase;margin-bottom:12px}
.hdr h1{font-size:clamp(1.7rem,4vw,2.4rem);font-weight:900;letter-spacing:-1px;background:linear-gradient(135deg,#f1f5f9,#64748b);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px}
.hdr p{font-size:14px;color:var(--text2);font-weight:300}

.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:8px;margin-bottom:28px}
.stat{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px;text-align:center}
.stat .num{font-family:'JetBrains Mono',monospace;font-size:1.4rem;font-weight:800;color:var(--accent)}
.stat .lbl{font-size:10px;color:var(--muted);font-weight:500;margin-top:1px}

.prog-sec{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px 20px;margin-bottom:24px}
.prog-title{font-weight:700;font-size:14px;margin-bottom:12px}
.prog-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.prog-label{font-size:12px;font-weight:500;min-width:80px}
.prog-bar{flex:1;height:6px;background:var(--surface);border-radius:100px;overflow:hidden}
.prog-fill{height:100%;border-radius:100px;transition:width .6s}
.fp{background:linear-gradient(90deg,#3b82f6,#06b6d4)}.fs{background:linear-gradient(90deg,#8b5cf6,#ec4899)}.fm{background:linear-gradient(90deg,#10b981,#06b6d4)}.fc{background:linear-gradient(90deg,#f97316,#eab308)}
.prog-pct{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);min-width:30px;text-align:right}

.toolbar{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.toolbar button{background:var(--surface);border:1px solid var(--border);border-radius:7px;color:var(--text2);font-size:11px;font-weight:600;padding:6px 12px;cursor:pointer;font-family:inherit;transition:all .2s;white-space:nowrap}
.toolbar button:hover{background:var(--card);color:var(--text);border-color:var(--border2)}
.toolbar button.danger{color:var(--red)}.toolbar button.danger:hover{background:rgba(239,68,68,0.1);border-color:rgba(239,68,68,0.3)}
.toolbar .info{margin-left:auto;font-size:11px;color:var(--muted);font-family:'JetBrains Mono',monospace}

.wk{margin-bottom:16px}
.wk-hdr{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--card);border:1px solid var(--border);border-radius:9px;cursor:pointer;user-select:none;transition:border-color .2s}
.wk-hdr:hover{border-color:var(--border2)}
.wk-badge{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:800;color:var(--accent);background:rgba(59,130,246,0.1);padding:2px 8px;border-radius:4px}
.wk-range{font-size:11px;color:var(--text2);font-family:'JetBrains Mono',monospace}
.wk-done{font-size:10px;color:var(--green);margin-left:6px;font-weight:600}
.wk-tog{margin-left:auto;font-size:12px;color:var(--muted);transition:transform .3s}
.wk-hdr.collapsed .wk-tog{transform:rotate(-90deg)}
.wk-body{padding-top:4px}.wk-body.hidden{display:none}

.dc{background:var(--card);border:1px solid var(--border);border-radius:10px;margin-bottom:6px;overflow:hidden;transition:all .3s}
.dc:hover{border-color:var(--border2)}
.dc.wknd{border-left:3px solid var(--yellow)}
.dc.shifted{opacity:.5;border-left:3px solid var(--red)}
.dh{display:flex;align-items:center;gap:6px;padding:7px 12px;background:var(--surface);border-bottom:1px solid var(--border);font-size:11px;flex-wrap:wrap}
.dh-idx{font-family:'JetBrains Mono',monospace;color:var(--muted);font-size:10px}
.dh-date{font-family:'JetBrains Mono',monospace;font-weight:600;color:var(--text2)}
.dh-dow{font-weight:500;color:var(--muted)}
.dh-note{margin-left:auto;font-size:9px;font-weight:600;color:var(--yellow);background:rgba(234,179,8,0.1);padding:1px 6px;border-radius:3px}
.shift-b{background:none;border:1px solid rgba(239,68,68,0.25);color:var(--red);font-size:9px;font-weight:600;padding:2px 7px;border-radius:3px;cursor:pointer;font-family:inherit;margin-left:6px;transition:all .2s}
.shift-b:hover{background:rgba(239,68,68,0.1)}
.ushift-b{display:none;background:none;border:1px solid rgba(16,185,129,0.25);color:var(--green);font-size:9px;font-weight:600;padding:2px 7px;border-radius:3px;cursor:pointer;font-family:inherit;margin-left:6px;transition:all .2s}
.ushift-b:hover{background:rgba(16,185,129,0.1)}
.dc.shifted .ushift-b{display:inline}.dc.shifted .shift-b{display:none}
.shift-tag{display:none;font-size:9px;font-weight:700;color:var(--red);background:rgba(239,68,68,0.08);padding:1px 6px;border-radius:3px}
.dc.shifted .shift-tag{display:inline}
.ds{padding:8px 10px;display:flex;flex-direction:column;gap:6px}

.sc{background:var(--bg2);border-radius:7px;padding:9px 10px;border-left:3px solid transparent;transition:all .3s}
.sc.done{opacity:.4}.sc.done .st{opacity:0.6;text-decoration:line-through}
.sh{display:flex;align-items:center;gap:5px;margin-bottom:4px;flex-wrap:wrap}
.scb{width:14px;height:14px;accent-color:var(--accent);cursor:pointer;flex-shrink:0}
.ssubj{font-size:10px;font-weight:700;padding:1px 6px;border-radius:3px;white-space:nowrap}
.stype{font-size:9px;color:var(--muted);margin-left:auto}.shrs{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--muted)}
.st{font-size:12px;font-weight:700;margin-bottom:3px}
.stasks{display:flex;flex-direction:column;gap:1px}
.ti{font-size:11px;color:var(--text2);padding-left:10px;position:relative;line-height:1.6}
.ti::before{content:'›';position:absolute;left:0;color:var(--muted);font-weight:700}
.ti.rev{color:#67e8f9}.ti.rev::before{content:'↻';color:#22d3ee}
.ti.mile{color:#fbbf24;font-weight:600}.ti.mile::before{content:'★';color:#fbbf24}
.awb{display:inline-flex;align-items:center;gap:2px;background:none;border:1px solid rgba(239,68,68,0.2);color:var(--red);font-size:9px;font-weight:600;padding:2px 6px;border-radius:3px;cursor:pointer;font-family:inherit;margin-top:3px;transition:all .2s}
.awb:hover{background:rgba(239,68,68,0.08)}

/* Wrong Q Section */
.wq-sec{}.wq-hdr{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.wq-hdr h2{font-size:18px;font-weight:800}
.wq-stats{display:flex;gap:10px;margin-bottom:16px}
.wq-stat{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 14px;text-align:center;flex:1;min-width:80px}
.wq-stat .num{font-family:'JetBrains Mono',monospace;font-size:1.3rem;font-weight:800}
.wq-stat .lbl{font-size:10px;color:var(--muted)}
.wq-filters{display:flex;gap:4px;margin-bottom:14px;flex-wrap:wrap}
.wq-f{background:var(--surface);border:1px solid var(--border);border-radius:5px;color:var(--text2);font-size:10px;font-weight:600;padding:4px 10px;cursor:pointer;font-family:inherit;transition:all .2s}
.wq-f.act{color:var(--accent);background:rgba(59,130,246,0.1);border-color:rgba(59,130,246,0.3)}
.wq-form{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:18px}
.wq-fr{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap;align-items:flex-start}
.wq-fr label{font-size:11px;font-weight:600;color:var(--text2);min-width:60px;padding-top:5px}
.wq-fr input,.wq-fr select,.wq-fr textarea{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:5px;color:var(--text);font-size:12px;padding:6px 8px;font-family:inherit;min-width:100px;resize:vertical}
.wq-fr textarea{min-height:40px}
.wq-fr input:focus,.wq-fr select:focus,.wq-fr textarea:focus{outline:none;border-color:var(--accent)}
.wq-sub{background:var(--accent);color:#fff;border:none;border-radius:6px;font-size:12px;font-weight:700;padding:7px 16px;cursor:pointer;font-family:inherit;transition:all .2s}
.wq-sub:hover{background:#2563eb}
.wq-list{display:flex;flex-direction:column;gap:8px}
.wq-c{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px;transition:all .3s}
.wq-c.mastered{opacity:.4;border-color:rgba(16,185,129,0.3)}
.wq-ch{display:flex;align-items:center;gap:6px;margin-bottom:4px;flex-wrap:wrap}
.wq-tag{font-size:10px;font-weight:700;padding:1px 6px;border-radius:3px;white-space:nowrap}
.wq-chp{font-size:12px;font-weight:600}
.wq-meta{display:flex;gap:8px;font-size:10px;color:var(--muted);margin-bottom:4px;font-family:'JetBrains Mono',monospace}
.wq-q{font-size:12px;color:var(--text2);margin-bottom:3px;line-height:1.5}
.wq-mk{font-size:11px;color:var(--red);opacity:.8;margin-bottom:2px}
.wq-cr{font-size:11px;color:var(--green);opacity:.8;margin-bottom:4px}
.wq-acts{display:flex;gap:4px;align-items:center;flex-wrap:wrap}
.wq-a{background:none;border:1px solid var(--border);border-radius:4px;font-size:9px;font-weight:600;color:var(--text2);padding:2px 8px;cursor:pointer;font-family:inherit;transition:all .2s}
.wq-a:hover{background:var(--surface);color:var(--text)}
.wq-a.del{color:var(--red);border-color:rgba(239,68,68,0.3)}.wq-a.del:hover{background:rgba(239,68,68,0.1)}
.wq-a.mst{color:var(--green);border-color:rgba(16,185,129,0.3)}.wq-a.mst:hover{background:rgba(16,185,129,0.1)}
.wq-empty{text-align:center;padding:30px;color:var(--muted)}.wq-empty .em{font-size:40px;margin-bottom:10px}.wq-empty p{font-size:13px}

.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:200;display:none;align-items:center;justify-content:center;padding:20px}
.modal-ov.show{display:flex}
.modal-b{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;max-width:480px;width:100%;max-height:80vh;overflow-y:auto}
.modal-b h3{font-size:15px;font-weight:800;margin-bottom:12px}

.tips{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px 20px;margin-top:24px}
.tips h3{font-size:14px;font-weight:700;margin-bottom:10px}
.tips-g{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:8px}
.tip-b{background:var(--surface);border-radius:8px;padding:10px}
.tip-b .te{font-size:16px;margin-bottom:3px}.tip-b .tt{font-size:11px;font-weight:700;margin-bottom:2px}.tip-b .tx{font-size:10px;color:var(--text2);line-height:1.6}

@media(max-width:600px){.container{padding:12px 8px}.stats{grid-template-columns:repeat(3,1fr)}.wq-fr{flex-direction:column}.wq-fr label{min-width:unset}}
</style>
</head>
<body>
<div class="topnav">
<div class="nav-logo">📖 StudyPlan</div>
<div class="nav-links">
<button class="active" id="nav-sched" onclick="showSec('schedule')">📅 日程</button>
<button id="nav-wq" onclick="showSec('wrong')">❌ 错题本<span class="nav-badge" id="wq-badge">0</span></button>
</div>
</div>

<div class="section active" id="sec-schedule">
<div class="container">
<div class="hdr"><div class="hdr-badge">📅 EDEXCEL A-LEVEL · DAILY PLAN</div><h1>每日学习计划</h1><p>2026年6月25日 → 9月2日 · 70天 · 从零到全书完成</p></div>
<div class="stats" id="stats-row"></div>
<div class="prog-sec" id="prog-section"></div>
<div class="toolbar">
<button onclick="expAll()">展开全部</button><button onclick="colAll()">折叠全部</button>
<button class="danger" onclick="shiftRange()">⏸ 推迟天数</button>
<span class="info" id="shift-info"></span>
</div>
<div id="sched-root"></div>
<div class="tips"><h3>💡 使用说明</h3><div class="tips-g">
<div class="tip-b"><div class="te">🔄</div><div class="tt">间隔复习</div><div class="tx">🔄标记的任务学后1/3/7天回顾，做题检测记忆。</div></div>
<div class="tip-b"><div class="te">⏸</div><div class="tt">推迟日程</div><div class="tx">点击每天的⏸按钮跳过，日期自动顺延。支持批量推迟。</div></div>
<div class="tip-b"><div class="te">❌</div><div class="tt">错题本</div><div class="tx">做错点击➕加入错题本，记录错误原因和正确思路。</div></div>
<div class="tip-b"><div class="te">✅</div><div class="tt">进度追踪</div><div class="tx">勾选任务自动保存，进度条实时更新。</div></div>
</div></div>
</div>
</div>

<div class="section" id="sec-wrong">
<div class="container">
<div class="hdr"><div class="hdr-badge">❌ WRONG QUESTION TRACKER</div><h1>错题本</h1><p>记录做错的题目 · 复习时优先回顾 · 标记已掌握后自动归档</p></div>
<div class="wq-stats" id="wq-stats"></div>
<div class="wq-filters" id="wq-filters"></div>
<div class="wq-form">
<h3 style="font-size:13px;font-weight:700;margin-bottom:8px">➕ 手动添加错题</h3>
<div class="wq-fr"><label>科目</label><select id="wf-s"><option>Pure</option><option>Stats</option><option>Mech</option><option>Chem</option></select></div>
<div class="wq-fr"><label>章节</label><input id="wf-c" placeholder="e.g. Ch2 Quadratics"></div>
<div class="wq-fr"><label>题目</label><input id="wf-q" placeholder="e.g. Ex 2E Q3"></div>
<div class="wq-fr"><label>错误</label><textarea id="wf-m" placeholder="哪里出错了？"></textarea></div>
<div class="wq-fr"><label>正解</label><textarea id="wf-r" placeholder="正确做法是什么？"></textarea></div>
<button class="wq-sub" onclick="addWQ()">添加错题</button>
</div>
<div class="wq-list" id="wq-list"></div>
</div>
</div>

<div class="modal-ov" id="modal">
<div class="modal-b">
<h3>❌ 添加到错题本</h3>
<div class="wq-fr"><label>章节</label><input id="mf-c" readonly style="opacity:.7"></div>
<div class="wq-fr"><label>题目</label><input id="mf-q" placeholder="e.g. Ex 2E Q3"></div>
<div class="wq-fr"><label>错误</label><textarea id="mf-m" placeholder="哪里出错了？"></textarea></div>
<div class="wq-fr"><label>正解</label><textarea id="mf-r" placeholder="正确做法？"></textarea></div>
<div style="display:flex;gap:6px;margin-top:8px"><button class="wq-sub" onclick="submitMod()">添加</button><button class="wq-a" onclick="closeMod()">取消</button></div>
</div>
</div>

ow":"Sun","isWeekend":true,"slots":[{"subject":"Pure Y2","topic":"Ch10 Numerical Methods","tasks":["Read p221-237: roots, iteration, Newton-Raphson","Ex 10A-D Q1-3 each, Mixed Ex 10 Q1,3,5"],"type":"learn","hrs":2},{"subject":"Stats Y2","topic":"🔄 Stats Y2 Mixed Practice","tasks":["Mixed practice Ch1-3: 10 questions","Calculator skills practice"],"type":"revise","hrs":1}]},{"idx":60,"dow":"Mon","isWeekend":false,"slots":[{"subject":"Pure Y2","topic":"Ch11 Integration (start - BIG chapter!)","tasks":["Read p238-260: standard, reverse chain, trig","Ex 11A-D Q1-5 each"],"type":"learn","hrs":3},{"subject":"Stats Y2","topic":"🔄 Review Ex 2 (SM Y2)","tasks":["Review Ex 2: Q1,3,5,7,9","🔄 Review Stats Y1: 15 mixed Qs"],"type":"revise","hrs":2}]},{"idx":61,"dow":"Tue","isWeekend":false,"slots":[{"subject":"Pure Y2","topic":"Ch11 (continue)","tasks":["Ex 11E-G Q1-4 each (substitution, parts, partial frac)"],"type":"learn","hrs":3},{"subject":"Mech Y2","topic":"🔄 Mech Y2 Full Review","tasks":["Mixed practice: 10 questions Ch4-8","Exam-style: TIMED"],"type":"revise","hrs":2}]},{"idx":62,"dow":"Wed","isWeekend":false,"slots":[{"subject":"Pure Y2","topic":"Ch11 (continue)","tasks":["Ex 11H-J Q1-3 each (areas, trapezium rule, DEs)"],"type":"learn","hrs":3},{"subject":"Chem Y1","topic":"🔄 Chem Final Review","tasks":["Topic quiz: 20 questions","6-mark writing Qs x3"],"type":"revise","hrs":2}]},{"idx":63,"dow":"Thu","isWeekend":false,"slots":[{"subject":"Pure Y2","topic":"Ch11 (finish)","tasks":["Ex 11K Q1-3, Mixed Ex 11 Q1,3,5,7,9"],"type":"practice","hrs":3},{"subject":"Chem Y1","topic":"🔄 Chem Weak Topics Focus","tasks":["Targeted practice 3 weakest chapters","Review all required practicals"],"type":"revise","hrs":2}]},{"idx":64,"dow":"Fri","isWeekend":false,"slots":[{"subject":"Pure Y2","topic":"Ch12 Vectors 3D","tasks":["Read p311-329: 3D vectors","Ex 12A-D Q1-3 each, Mixed Ex 12 Q1,3,5"],"type":"learn","hrs":3},{"subject":"Mech Y2","topic":"🔄 Mech Weak Topics Focus","tasks":["Pulleys & connected particles practice","Inclined plane problems"],"type":"revise","hrs":2}]},{"idx":65,"dow":"Sat","isWeekend":true,"slots":[{"subject":"Pure Y2","topic":"🔄 PURE Y2 Review Ex 3","tasks":["Review Ex 3: Q1,3,5,7,9,11,13","🔄 Integration techniques summary"],"type":"revise","hrs":1.5},{"subject":"Stats ALL","topic":"🔄 Stats Y1+Y2 Combined","tasks":["Mixed practice: 15 questions","Hypothesis testing rules from memory"],"type":"revise","hrs":1.5}]},{"idx":66,"dow":"Sun","isWeekend":true,"slots":[{"subject":"Pure Y2","topic":"🔄 PURE Y2 Exam Practice","tasks":["Exam Paper 1: TIMED 2hr","Mark errors, add to ❌错题本"],"type":"revise","hrs":2},{"subject":"Chem Y1","topic":"🔄 Chem Final","tasks":["Practice paper TIMED","Organic mechanisms from memory"],"type":"revise","hrs":1}]},{"idx":67,"dow":"Mon","isWeekend":false,"slots":[{"subject":"Pure Y2","topic":"🔄 PURE Y2 Exam Practice 2","tasks":["Exam Paper 2: TIMED 2hr","Mark, review, redo wrong Qs"],"type":"revise","hrs":2.5},{"subject":"Stats+Mech ALL","topic":"🔄 Stats & Mech Full Paper","tasks":["Complete paper: TIMED","Mark & identify weakest topics","Formula sheet: write ALL from memory"],"type":"revise","hrs":2.5}]},{"idx":68,"dow":"Tue","isWeekend":false,"slots":[{"subject":"ALL","topic":"🔄 COMPREHENSIVE REVIEW","tasks":["Redo ALL wrong Qs from ❌错题本","Focus on weakest topics","Create master formula sheets","🏁 You finished all 5 textbooks!"],"type":"revise","hrs":5}]},{"idx":69,"dow":"Wed","isWeekend":false,"slots":[{"subject":"ALL","topic":"🔄 FINAL CONSOLIDATION","tasks":["Light review of summary sheets","Redo easy Qs for confidence","📌 1 past paper/week/subject until 2028 exam"],"type":"revise","hrs":3}]}];
const DOW_CN={Mon:"周一",Tue:"周二",Wed:"周三",Thu:"周四",Fri:"周五",Sat:"周六",Sun:"周日"};
const SC={Pure:{bg:"rgba(59,130,246,.12)",tx:"#60a5fa",bd:"rgba(59,130,246,.4)",ic:"📐"},Stats:{bg:"rgba(139,92,246,.12)",tx:"#a78bfa",bd:"rgba(139,92,246,.4)",ic:"📊"},Mech:{bg:"rgba(16,185,129,.12)",tx:"#34d399",bd:"rgba(16,185,129,.4)",ic:"⚙️"},Chem:{bg:"rgba(249,115,22,.12)",tx:"#fb923c",bd:"rgba(249,115,22,.4)",ic:"🧪"}};

let shifted=new Set(),cbState={},wqData=[],wqFilter="all";

function save(){localStorage.setItem('sp-s',JSON.stringify([...shifted]));localStorage.setItem('sp-c',JSON.stringify(cbState));localStorage.setItem('sp-w',JSON.stringify(wqData))}
function load(){try{const s=localStorage.getItem('sp-s');if(s)shifted=new Set(JSON.parse(s));const c=localStorage.getItem('sp-c');if(c)cbState=JSON.parse(c);const w=localStorage.getItem('sp-w');if(w)wqData=JSON.parse(w)}catch(e){}}

function dateOf(i){const b=new Date(2026,5,25);let off=0;for(const s of shifted)if(parseInt(s)<=i)off++;return new Date(b.getTime()+(i+off)*864e5)}
function fmtD(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}

function subjKey(s){if(s.includes('Pure'))return'Pure';if(s.includes('Stats'))return'Stats';if(s.includes('Mech'))return'Mech';return'Chem'}
function typeLabel(t){return t==='practice'?'✍️ 练习':t==='revise'?'🔄 复习':'📖 学习'}

function render(){
  let h='',wn=0,wd=[];
  for(let i=0;i<D.length;i++){
    if(i%7===0){if(wn>0)h+=renderWk(wn,wd);wn++;wd=[]}
    wd.push(i);
  }
  if(wd.length)h+=renderWk(wn,wd);
  document.getElementById('sched-root').innerHTML=h;
  for(const[id,ck]of Object.entries(cbState)){const e=document.getElementById(id);if(e){e.checked=ck;if(ck)e.closest('.sc').classList.add('done')}}
  updStats();
}

function renderWk(n,di){
  const d0=fmtD(dateOf(di[0])),d1=fmtD(dateOf(di[di.length-1]));
  let b='';for(const i of di)b+=renderDay(i);
  return`<div class="wk"><div class="wk-hdr" onclick="this.classList.toggle('collapsed');this.nextElementSibling.classList.toggle('hidden')"><div class="wk-badge">W${n}</div><div class="wk-range">${d0} → ${d1}</div><div class="wk-done" id="wd${n}"></div><div class="wk-tog">▾</div></div><div class="wk-body">${b}</div></div>`;
}

function renderDay(i){
  const d=D[i],dt=fmtD(dateOf(i)),sh=shifted.has(String(i)),wk=d.isWeekend;
  const cls=['dc'];if(wk)cls.push('wknd');if(sh)cls.push('shifted');
  let sl='';d.slots.forEach((s,si)=>{
    const cb=`cb${i}_${si}`,k=subjKey(s.subject),c=SC[k]||SC.Pure,tl=typeLabel(s.type);
    let ts='';s.tasks.forEach(t=>{if(t.startsWith('🔄'))ts+=`<div class="ti rev">${t}</div>`;else if(t.startsWith('🏁')||t.startsWith('📌'))ts+=`<div class="ti mile">${t}</div>`;else ts+=`<div class="ti">${t}</div>`});
    sl+=`<div class="sc" style="border-left-color:${c.bd}" id="s${cb}"><div class="sh"><input type="checkbox" class="scb" id="${cb}" onchange="onCb(this)"><span class="ssubj" style="background:${c.bg};color:${c.tx}">${c.ic} ${s.subject}</span><span class="stype">${tl}</span><span class="shrs">${s.hrs}h</span></div><div class="st">${s.topic}</div><div class="stasks">${ts}</div><button class="awb" onclick="openMod('${k}','${s.topic.replace(/'/g,"\'")}')">❌ 加入错题本</button></div>`;
  });
  return`<div class="${cls.join(' ')}" id="d${i}"><div class="dh"><span class="dh-idx">#${i+1}</span><span class="dh-date">${dt}</span><span class="dh-dow">${d.dow} ${DOW_CN[d.dow]||''}</span>${wk?'<span class="dh-note">打工日</span>':''}<span class="shift-tag">⏸ 已推迟</span><button class="shift-b" onclick="togShift(${i})">⏸ 推迟</button><button class="ushift-b" onclick="togShift(${i})">↩ 恢复</button></div><div class="ds">${sl}</div></div>`;
}

function onCb(e){const c=e.closest('.sc');if(e.checked)c.classList.add('done');else c.classList.remove('done');cbState[e.id]=e.checked;save();updStats()}

function togShift(i){const k=String(i);if(shifted.has(k))shifted.delete(k);else shifted.add(k);save();render()}

function shiftRange(){
  const v=prompt('推迟哪几天？\n输入天数编号(逗号分隔) 如: 3,4,5\n或范围 如: 3-7');
  if(!v)return;let idx=[];
  if(v.includes('-')){const[a,b]=v.split('-').map(Number);for(let i=a;i<=b;i++)idx.push(i-1)}
  else idx=v.split(',').map(s=>parseInt(s.trim())-1).filter(n=>!isNaN(n));
  idx.forEach(i=>shifted.add(String(i)));save();render();
  alert(`已推迟${idx.length}天，后续日期自动顺延！`);
}

function expAll(){document.querySelectorAll('.wk-hdr').forEach(h=>h.classList.remove('collapsed'));document.querySelectorAll('.wk-body').forEach(b=>b.classList.remove('hidden'))}
function colAll(){document.querySelectorAll('.wk-hdr').forEach(h=>h.classList.add('collapsed'));document.querySelectorAll('.wk-body').forEach(b=>b.classList.add('hidden'))}

function updStats(){
  let tot=0,dn=0;const ct={Pure:{d:0,t:0},Stats:{d:0,t:0},Mech:{d:0,t:0},Chem:{d:0,t:0}};
  document.querySelectorAll('.scb').forEach(cb=>{tot++;if(cb.checked)dn++;const s=cb.closest('.sc').querySelector('.ssubj').textContent;const k=subjKey(s);if(ct[k]){ct[k].t++;if(cb.checked)ct[k].d++}});
  document.getElementById('stats-row').innerHTML=`
    <div class="stat"><div class="num">70</div><div class="lbl">总天数</div></div>
    <div class="stat"><div class="num" style="color:var(--green)">${dn}</div><div class="lbl">已完成</div></div>
    <div class="stat"><div class="num" style="color:var(--red)">${shifted.size}</div><div class="lbl">已推迟</div></div>
    <div class="stat"><div class="num" style="color:var(--purple)">55</div><div class="lbl">章节</div></div>
    <div class="stat"><div class="num" style="color:var(--orange)">5</div><div class="lbl">教材</div></div>
    <div class="stat"><div class="num" style="color:var(--yellow)">~260</div><div class="lbl">总学时</div></div>`;

  let ph='';for(const[k,v]of Object.entries(ct)){const p=v.t?Math.round(v.d/v.t*100):0;ph+=`<div class="prog-row"><span class="prog-label">${SC[k].ic} ${k}</span><div class="prog-bar"><div class="prog-fill f${k[0].toLowerCase()}" style="width:${p}%"></div></div><span class="prog-pct">${p}%</span></div>`}
  document.getElementById('prog-section').innerHTML=`<div class="prog-title">📈 实时进度</div>${ph}`;

  document.querySelectorAll('.wk').forEach(w=>{const t=w.querySelectorAll('.scb').length,d=w.querySelectorAll('.scb:checked').length;const n=w.querySelector('.wk-badge').textContent.replace('W','');const e=document.getElementById('wd'+n);if(e&&t)e.textContent=d+'/'+t+' ✓'});
}

// WRONG QUESTIONS
function renderWQ(){
  let f=wqData;if(wqFilter==='active')f=wqData.filter(q=>!q.mastered);else if(wqFilter==='mastered')f=wqData.filter(q=>q.mastered);else if(['Pure','Stats','Mech','Chem'].includes(wqFilter))f=wqData.filter(q=>q.subject===wqFilter);
  document.getElementById('wq-badge').textContent=wqData.filter(q=>!q.mastered).length;
  document.getElementById('wq-stats').innerHTML=`
    <div class="wq-stat"><div class="num" style="color:var(--red)">${wqData.length}</div><div class="lbl">总错题</div></div>
    <div class="wq-stat"><div class="num" style="color:var(--orange)">${wqData.filter(q=>!q.mastered).length}</div><div class="lbl">待复习</div></div>
    <div class="wq-stat"><div class="num" style="color:var(--green)">${wqData.filter(q=>q.mastered).length}</div><div class="lbl">已掌握</div></div>`;
  const filters=['all','active','mastered','Pure','Stats','Mech','Chem'];
  document.getElementById('wq-filters').innerHTML=filters.map(f=>`<button class="wq-f${wqFilter===f?' act':''}" data-f="${f}">${f==='all'?'全部':f==='active'?'待复习':f==='mastered'?'已掌握':f}</button>`).join('');
  if(!f.length){document.getElementById('wq-list').innerHTML=`<div class="wq-empty"><div class="em">📭</div><p>${wqData.length?'当前筛选无结果':'还没有错题记录，做题时点击 ❌加入错题本'}</p></div>`;return}
  document.getElementById('wq-list').innerHTML=f.map(q=>{
    const c=SC[q.subject]||SC.Pure;
    return`<div class="wq-c${q.mastered?' mastered':''}"><div class="wq-ch"><span class="wq-tag" style="background:${c.bg};color:${c.tx}">${c.ic} ${q.subject}</span><span class="wq-chp">${q.chapter||'未指定'}</span></div><div class="wq-meta"><span>📅 ${q.date}</span><span>🔄 ${q.attempts}次</span>${q.lastAttempt?'<span>上次:'+q.lastAttempt+'</span>':''}</div><div class="wq-q">❓ ${q.question}</div>${q.mistake?'<div class="wq-mk">❌ '+q.mistake+'</div>':''}${q.correct?'<div class="wq-cr">✅ '+q.correct+'</div>':''}<div class="wq-acts"><button class="wq-a" onclick="attWQ(${q.id})">🔄 重做</button><button class="wq-a mst" onclick="mstWQ(${q.id})">${q.mastered?'↩ 取消':'✅ 掌握'}</button><button class="wq-a del" onclick="delWQ(${q.id})">🗑 删除</button></div></div>`;
  }).join('');
}

function addWQ(){
  const s=document.getElementById('wf-s').value,ch=document.getElementById('wf-c').value.trim(),q=document.getElementById('wf-q').value.trim(),m=document.getElementById('wf-m').value.trim(),r=document.getElementById('wf-r').value.trim();
  if(!q){alert('请填写题目');return}
  wqData.push({id:Date.now(),subject:s,chapter:ch,question:q,mistake:m,correct:r,date:new Date().toISOString().slice(0,10),mastered:false,attempts:0,lastAttempt:null});
  ['wf-c','wf-q','wf-m','wf-r'].forEach(id=>document.getElementById(id).value='');save();renderWQ();
}

function attWQ(id){const q=wqData.find(q=>q.id===id);if(q){q.attempts++;q.lastAttempt=new Date().toISOString().slice(0,10);save();renderWQ()}}
function mstWQ(id){const q=wqData.find(q=>q.id===id);if(q){q.mastered=!q.mastered;save();renderWQ()}}
function delWQ(id){if(confirm('确定删除？')){wqData=wqData.filter(q=>q.id!==id);save();renderWQ()}}

let modS='',modC='';
function openMod(s,t){modS=s;modC=t;document.getElementById('mf-c').value=t;document.getElementById('mf-q').value='';document.getElementById('mf-m').value='';document.getElementById('mf-r').value='';document.getElementById('modal').classList.add('show')}
function closeMod(){document.getElementById('modal').classList.remove('show')}
function submitMod(){
  const q=document.getElementById('mf-q').value.trim(),m=document.getElementById('mf-m').value.trim(),r=document.getElementById('mf-r').value.trim();
  if(!q){alert('请填写题目');return}
  wqData.push({id:Date.now(),subject:modS,chapter:modC,question:q,mistake:m,correct:r,date:new Date().toISOString().slice(0,10),mastered:false,attempts:0,lastAttempt:null});
  save();renderWQ();closeMod();
  const b=document.getElementById('wq-badge');b.style.transform='scale(1.5)';setTimeout(()=>b.style.transform='',300);
}
document.getElementById('modal').onclick=function(e){if(e.target===this)closeMod()};

document.getElementById('wq-filters').onclick=function(e){const b=e.target.closest('.wq-f');if(!b)return;wqFilter=b.dataset.f;renderWQ()};

function showSec(n){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById('sec-'+n).classList.add('active');
  document.getElementById('nav-sched').classList.toggle('active',n==='schedule');
  document.getElementById('nav-wq').classList.toggle('active',n==='wrong');
  if(n==='wrong')renderWQ();
  window.scrollTo(0,0);
}

load();render();renderWQ();
</script>
